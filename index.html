    <!-- ═══ Google Fonts: Preconnect for speed ═══ -->

    <!-- ═══ Google Fonts: All 7 families used in the invitation ═══ -->

    <!-- ═══ Font Loading Screen (prevents FOUT) ═══ -->
    <style>
      /* Loading screen shown until fonts are ready */
      #font-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #071830;
        transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
      }
      #font-loader.loaded {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #font-loader .loader-ganesha {
        width: 80px;
        height: 80px;
        opacity: 0.6;
        animation: loader-pulse 2s ease-in-out infinite;
      }
      #font-loader .loader-text {
        font-family: 'Cormorant Garamond', Georgia, serif;
        color: #C8A45C;
        font-size: 14px;
        letter-spacing: 0.3em;
        margin-top: 24px;
        opacity: 0.7;
        animation: loader-fade 2s ease-in-out infinite;
      }
      #font-loader .loader-bar-track {
        width: 120px;
        height: 2px;
        background: rgba(200, 164, 92, 0.15);
        border-radius: 2px;
        margin-top: 16px;
        overflow: hidden;
      }
      #font-loader .loader-bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #C8A45C, transparent);
        border-radius: 2px;
        animation: loader-slide 1.5s ease-in-out infinite;
      }
      @keyframes loader-pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.08); opacity: 0.8; }
      }
      @keyframes loader-fade {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.9; }
      }
      @keyframes loader-slide {
        0% { transform: translateX(-150%); }
        100% { transform: translateX(400%); }
      }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Event",
      "name": "Harshit & Anshikha Wedding",
      "startDate": "2026-05-09",
      "endDate": "2026-05-11",
      "location": {
        "@type": "Place",
        "name": "Bliss Resort, Bhilwara & Bhairav Bagh Palace, Udaipur"
      },
      "description": "Three-day wedding celebration of Harshit and Anshikha"
    }
    </script>
  </head>
  <body>
    <!-- Font Loading Screen -->
    <div id="font-loader">
      <svg class="loader-ganesha" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="#C8A45C" stroke-width="0.5" opacity="0.3"/>
        <circle cx="50" cy="50" r="35" stroke="#C8A45C" stroke-width="0.3" opacity="0.2" stroke-dasharray="4 4"/>
        <text x="50" y="55" text-anchor="middle" fill="#C8A45C" font-size="28" opacity="0.8">🙏</text>
      </svg>
      <div class="loader-text">PREPARING YOUR INVITATION</div>
      <div class="loader-bar-track">
        <div class="loader-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Font load detection -->
    <script>
      (function() {
        var loader = document.getElementById('font-loader');
        // Use Font Loading API if available
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function() {
            setTimeout(function() {
              loader.classList.add('loaded');
              setTimeout(function() { loader.remove(); }, 1000);
            }, 600);
          });
        } else {
          // Fallback: hide after 3s
          setTimeout(function() {
            loader.classList.add('loaded');
            setTimeout(function() { loader.remove(); }, 1000);
          }, 3000);
        }
        // Safety net: always hide after 5s
        setTimeout(function() {
          if (loader && !loader.classList.contains('loaded')) {
            loader.classList.add('loaded');
            setTimeout(function() { if(loader.parentNode) loader.remove(); }, 1000);
          }
        }, 5000);
      })();
    </script>
  </body>
</html>
